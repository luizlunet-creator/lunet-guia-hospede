<body>

<div class="phone">

  <div class="phone-bg">
    <img src="assets/checkin-hero-mobile.jpg" alt="" class="phone-bg-img">
  </div>

  <!-- HOME -->
  <section class="view" id="view-home" data-active="true">
    <header class="hero">
      <div class="logo">
        <img src="assets/logo-lunet-cropped.png" alt="Lunet" class="logo-img">
        <p class="tag">Predio Lunet · Apartamento Airbnb5</p>
      </div>

      <h1 class="main-title">GUIA DE BOAS-VINDAS</h1>
      <h2 class="welcome-title">Fique, Explore e Aproveite</h2>
      <p class="welcome-sub">Tudo o que voce precisa saber sobre sua estadia esta aqui embaixo 👇</p>
    </header>

    <nav class="menu-grid" id="menu-grid">
      <!-- generated by JS -->
    </nav>

    <a class="whatsapp-float" id="whatsapp-link" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" width="26" height="26"><path fill="currentColor" d="M12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.75.46 3.45 1.32 4.95L2.05 22l5.25-1.38a9.9 9.9 0 0 0 4.74 1.2h.01c5.46 0 9.9-4.45 9.9-9.91C22 6.45 17.5 2 12.04 2Zm0 18.06h-.01a8.2 8.2 0 0 1-4.17-1.14l-.3-.18-3.11.82.83-3.03-.2-.31a8.18 8.18 0 0 1-1.26-4.35c0-4.52 3.68-8.2 8.22-8.2 2.2 0 4.26.86 5.82 2.42a8.15 8.15 0 0 1 2.41 5.8c0 4.53-3.69 8.2-8.23 8.2Zm4.5-6.15c-.25-.12-1.47-.72-1.7-.81-.23-.08-.4-.12-.56.13-.17.25-.64.81-.79.97-.14.17-.29.19-.54.06-.25-.12-1.04-.38-1.99-1.22-.73-.66-1.23-1.47-1.37-1.72-.14-.25-.02-.38.11-.51.11-.11.25-.29.37-.43.12-.15.16-.25.25-.42.08-.17.04-.31-.02-.43-.06-.12-.56-1.35-.77-1.85-.2-.48-.41-.42-.56-.43h-.48c-.17 0-.43.06-.66.31-.23.25-.86.85-.86 2.07 0 1.22.89 2.4 1.01 2.57.12.17 1.75 2.67 4.24 3.74.59.26 1.05.41 1.41.52.59.19 1.13.16 1.55.1.47-.07 1.47-.6 1.68-1.18.21-.58.21-1.08.15-1.18-.06-.1-.23-.16-.48-.28Z"/></svg>
    </a>
  </section>

  <!-- SUB PAGES -->
  <section class="view" id="view-page">
    <header class="page-header">
      <button class="back-btn" id="back-btn" aria-label="Voltar">
        <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M15.5 4 6 12l9.5 8 1.5-1.6L9.3 12l7.7-6.4Z"/></svg>
      </button>
      <h2 id="page-title"></h2>
    </header>
    <div class="page-content" id="page-content"></div>
  </section>

  <!-- EDITOR -->
  <section class="view" id="view-editor">
    <header class="page-header">
      <button class="back-btn" id="editor-close-btn" aria-label="Fechar edicao">
        <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M6.4 4.98 4.98 6.4 10.59 12l-5.61 5.6 1.42 1.42L12 13.41l5.6 5.61 1.42-1.42L13.41 12l5.61-5.6-1.42-1.42L12 10.59Z"/></svg>
      </button>
      <h2>Editar site</h2>
    </header>
    <div class="page-content" id="editor-content"></div>
  </section>

</div>

<button class="edit-fab" id="edit-fab" aria-label="Editar site">
  <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25ZM20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83Z"/></svg>
</button>

<div class="edit-gate" id="edit-gate">
  <div class="edit-gate-box">
    <h3>Área restrita</h3>
    <p>Digite a senha para editar o conteúdo do site.</p>
    <input type="password" id="edit-password-input" class="edit-input" placeholder="Senha">
    <button id="edit-password-submit" class="btn-link">Entrar</button>
    <button id="edit-gate-cancel" class="mini-btn">Cancelar</button>
  </div>
</div>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightbox-close" aria-label="Fechar">
    <svg viewBox="0 0 24 24" width="26" height="26"><path fill="currentColor" d="M6.4 4.98 4.98 6.4 10.59 12l-5.61 5.6 1.42 1.42L12 13.41l5.6 5.61 1.42-1.42L13.41 12l5.61-5.6-1.42-1.42L12 10.59Z"/></svg>
  </button>
  <img id="lightbox-img" src="" alt="">
</div>

<script src="content.js"></script>
<script src="script.js"></script>
</body>
</html>
